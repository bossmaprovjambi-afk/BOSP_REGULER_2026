<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Responsive Bossma</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f7fa;
      display: flex;
      height: 100vh;
      overflow-x: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #00c6ff, #0072ff);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      position: fixed;
      top: 0;
      left: -220px;
      height: 100%;
      transition: left 0.3s ease;
      z-index: 1000;
    }

    .sidebar.active { left: 0; }

    .logo {
      text-align: center;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .menu { list-style: none; padding: 0; }
    .menu li {
      margin: 15px 0;
      cursor: pointer;
      transition: 0.3s;
    }
    .menu li:hover { color: #00f7ff; }

    .bottom { display: flex; flex-direction: column; gap: 10px; }
    .mode-btn, .logout {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .mode-btn { background: #fff; color: #0072ff; }
    .logout { background: #ff4b5c; color: #fff; }

    /* Toggle Button */
    .toggle-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      font-size: 24px;
      cursor: pointer;
      color: #0072ff;
      z-index: 1100;
    }

    /* Main Content */
    .content {
      flex: 1;
      padding: 20px;
      margin-left: 220px;
      transition: margin-left 0.3s ease;
      width: 100%;
    }
    .content.full { margin-left: 0; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .profile { display: flex; align-items: center; gap: 10px; }
    .avatar {
      background: #0072ff;
      color: #fff;
      border-radius: 50%;
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
    }

    .download {
      background: #00c6ff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
    }

    .cards { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
    .card {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      min-width: 150px;
    }
    .orange { border-top: 5px solid #ffb347; }
    .blue { border-top: 5px solid #0072ff; }
    .purple { border-top: 5px solid #9b59b6; }

    .charts { display: flex; gap: 20px; flex-wrap: wrap; }
    canvas {
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      flex: 1;
      min-width: 300px;
    }

    .stats { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .stat {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      min-width: 150px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .content { margin-left: 0; }
    }
  </style>
</head>
<body>
  <!-- Toggle Button -->
  <div class="toggle-btn">☰</div>

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">Logo Here</h2>
    <ul class="menu">
      <li>🏠 Dashboard</li>
      <li>💬 Messages</li>
      <li>📊 Report</li>
      <li>⚙️ Setting</li>
      <li>🔒 Privacy</li>
      <li>🧩 Configuration</li>
    </ul>
    <div class="bottom">
      <button class="mode-btn">🌙 Light Mode</button>
      <button class="logout">Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="content full">
    <header class="topbar">
      <div class="profile">
        <div class="avatar">YN</div>
        <div>
          <h3>Your Name</h3>
          <p>WELCOME TO DASHBOARD</p>
        </div>
      </div>
      <button class="download">⬇️ Download Report</button>
    </header>

    <section class="cards">
      <div class="card orange">Total Project<br><span>30</span></div>
      <div class="card blue">Total Tasks<br><span>210</span></div>
      <div class="card purple">Members<br><span>86</span></div>
    </section>

    <section class="charts">
      <canvas id="lineChart"></canvas>
      <canvas id="pieChart"></canvas>
    </section>

    <section class="stats">
      <div class="stat">
        <h4>Profit</h4>
        <p>💰 $850.00</p>
        <span style="color:green;">+45%</span>
      </div>
      <div class="stat">
        <h4>Total Payments</h4>
        <p>💵 $550.00</p>
        <span style="color:red;">Tax 5%</span>
      </div>
    </section>
  </main>

  <script>
    // Sidebar toggle
    const toggleBtn = document.querySelector(".toggle-btn");
    const sidebar = document.querySelector(".sidebar");
    const content = document.querySelector(".content");

    toggleBtn.addEventListener("click", () => {
      sidebar.classList.toggle("active");
      content.classList.toggle("full");
    });

    // Line Chart
    const ctxLine = document.getElementById('lineChart');
    new Chart(ctxLine, {
      type: 'line',
      data: {
        labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
        datasets: [{
          label: 'Project Growth',
          data: [120,300,250,400,380,420,390,410,370,430,400,450],
          borderColor: '#0072ff',
          backgroundColor: 'rgba(0,114,255,0.2)',
          fill: true,
          tension: 0.3
        }]
      },
      options: { responsive: true }
    });

    // Pie Chart
    const ctxPie = document.getElementById('pieChart');
    new Chart(ctxPie, {
      type: 'doughnut',
      data: {
        labels: ['Lorem Ipsum','Dolor Sit','Consectetuer'],
        datasets: [{
          data: [120,80,50],
          backgroundColor: ['#ffb347','#2ecc71','#0072ff']
        }]
      },
      options: { responsive: true }
    });
  </script>
</body>
</html>
