<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Jambi - Sidebar</title>
  <!-- Menghubungkan ke file CSS eksternal -->
  <link rel="stylesheet" href="style.css">
  <!-- Font Awesome CDN untuk memunculkan ikon menu -->
  <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

  <div class="app-container">
    
    <!-- === START SIDEBAR === -->
    <aside class="sidebar">
      
      <!-- Bagian Logo Provinsi Jambi -->
      <div class="sidebar-logo">
        <!-- Pastikan nama file gambar ini sesuai dengan yang Anda upload di GitHub -->
        <img src="logo-jambi.jpg" alt="Logo Provinsi Jambi">
      </div>
      
      <!-- Profil Pengguna -->
      <div class="profile-section">
        <div class="profile-img-wrapper">
          <img class="profile-img" src="https://unsplash.com" alt="Profile">
        </div>
        <h2 class="profile-name">Craig David</h2>
        <p class="profile-role">Web Designer</p>
      </div>

      <!-- Navigasi Menu Tengah -->
      <nav class="sidebar-nav">
        <ul>
          
          <!-- Menu 1 (Default Aktif) -->
          <li class="menu-item active">
            <a href="#">
              <span class="menu-link-content">
                <i class="fa-solid fa-house menu-icon"></i>
                <span>Feed</span>
              </span>
              <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>
          </li>

          <!-- Menu 2 -->
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <i class="fa-solid fa-magnifying-glass menu-icon"></i>
                <span>Explore</span>
              </span>
              <i class="fa-solid fa-chevron-right arrow-icon"></i>
            </a>
          </li>

          <!-- Menu 3 -->
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <i class="fa-solid fa-bell menu-icon"></i>
                <span>Notifications</span>
              </span>
            </a>
          </li>

          <!-- Menu 4 -->
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <i class="fa-solid fa-paper-plane menu-icon"></i>
                <span>Direct</span>
              </span>
            </a>
          </li>

          <!-- Menu 5 -->
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <i class="fa-solid fa-chart-simple menu-icon"></i>
                <span>Stats</span>
              </span>
            </a>
          </li>

        </ul>
      </nav>

      <!-- Tombol Keluar Bagian Bawah -->
      <div class="sidebar-footer">
        <a href="#" class="signout-btn">
          <i class="fa-solid fa-arrow-right-from-bracket menu-icon"></i>
          <span>Sign out</span>
        </a>
      </div>

    </aside>
    <!-- === END SIDEBAR === -->

    <!-- Area Konten Utama Halaman (Sebelah Kanan Sidebar) -->
    <main class="main-content">
      <h1>Selamat Datang</h1>
      <p>Konten utama website Anda diletakkan di sini...</p>
    </main>

  </div>

  <!-- Menghubungkan ke file JavaScript eksternal -->
  <script src="script.js"></script>
</body>
</html>
