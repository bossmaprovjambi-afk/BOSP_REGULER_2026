<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Dinas Pendidikan Provinsi Jambi</title>
  <!-- Menghubungkan ke file CSS eksternal -->
  <link rel="stylesheet" href="style.css">
  
  <!-- Memanggil Library Chart.js Resmi via CDN -->
  <script src="https://jsdelivr.net"></script>

  <style>
    /* Menyusutkan jarak atas agar teks instansi naik pas di bawah logo */
    .profile-section {
      margin-top: -5px !important; 
    }
    /* Memastikan area pembungkus gambar profil lama tidak memakan ruang halaman */
    .profile-img-wrapper {
      display: none !important;
    }
    /* Kotak Panel Grafik 3D */
    .chart-panel {
      background-color: #ffffff;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      padding: 24px;
      margin-top: 24px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    .chart-container {
      position: relative;
      width: 100%;
      height: 380px;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- === START SIDEBAR === -->
    <aside class="sidebar">
      
      <!-- Bagian Logo Provinsi Jambi -->
      <div class="sidebar-logo">
        <img src="logo-jambi.png" alt="Logo Provinsi Jambi">
      </div>
      
      <!-- Profil Pengguna (Sudah Bersih Tanpa Ikon Profil) -->
      <div class="profile-section">
        <h2 class="profile-name">DINAS PENDIDIKAN</h2>
        <h2 class="profile-name" style="margin-top: 1px;">PROVINSI JAMBI</h2>
        <p class="profile-role">Bidang Pembinaan SMA</p>
      </div>

      <!-- Navigasi Menu Tengah -->
      <nav class="sidebar-nav">
        <ul>
          <li class="menu-item active">
            <a href="#">
              <span class="menu-link-content">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Status Kirim</span>
              </span>
              <svg class="arrow-icon" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </a>
          </li>
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <span>Laporan BKU</span>
              </span>
              <svg class="arrow-icon" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </a>
          </li>
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                <span>Notifications</span>
              </span>
            </a>
          </li>
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
                <span>Rkas Awal</span>
              </span>
            </a>
          </li>
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20h4V4h-4v16zm-6 0h4v-8H4v8zM16 9v11h4V9h-4z"/></svg>
                <span>Print Laporan</span>
              </span>
            </a>
          </li>
        </ul>
      </nav>

      <!-- Tombol Keluar Bawah -->
      <div class="sidebar-footer">
        <a href="#" class="signout-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
          <span>Sign out</span>
        </a>
      </div>

    </aside>
    <!-- === END SIDEBAR === -->


    <!-- === START AREA KONTEN UTAMA === -->
    <main class="main-content">
      
      <!-- Header Dashboard -->
      <header class="content-header" style="margin-bottom: 20px;">
        <div>
          <h1>Visualisasi 3D Laporan BOSP 2026</h1>
          <p>Grafik dimensional pemantauan pagu, realisasi anggaran, dan sisa dana sekolah di Provinsi Jambi.</p>
        </div>
      </header>

      <!-- Panel Grafik 3D Berdimensi -->
      <section class="chart-panel">
        <div class="chart-container">
          <canvas id="bosp3dChart"></canvas>
        </div>
      </section>

    </main>
    <!-- === END AREA KONTEN UTAMA === -->

  </div>

  <!-- Script Logika Grafik Berdimensi -->
  <script>
    const ctx = document.getElementById('bosp3dChart').getContext('2d');
    
    // Inisialisasi Chart baru dengan manipulasi visual bayangan kedalaman (3D effect)
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['SMAN 1 Jambi', 'SMAN 3 Muaro Jambi', 'SMAN 5 Bungo', 'SMAN 2 Tebo', 'SMAN 1 Sarolangun'],
        datasets: [
          {
            label: 'Dimensi 1: Pagu Anggaran (Rp)',
            data: [140000000, 115000000, 95000000, 120000000, 88000000],
            backgroundColor: '#1e3a8a', // Biru Tua
            borderRadius: 6,
            borderSkipped: false
          },
          {
            label: 'Dimensi 2: Realisasi Anggaran (Rp)',
            data: [95000000, 80000000, 95000000, 60000000, 45000000],
            backgroundColor: '#eab308', // Emas
            borderRadius: 6,
            borderSkipped: false
          },
          {
            label: 'Dimensi 3: Sisa Dana BOS (Rp)',
            data: [45000000, 35000000, 0, 60000000, 43000000],
            backgroundColor: '#ef4444', // Merah
            borderRadius: 6,
            borderSkipped: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'top',
            labels: { font: { weight: 'bold', family: 'sans-serif' } }
          }
        },
        scales: {
          x: {
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            ticks: {
              callback: function(value) {
                return 'Rp ' + value.toLocaleString('id-ID');
              }
            }
          }
        }
      }
    });
  </script>

  <script src="script.js"></script>
</body>
</html>
