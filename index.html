<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Jambi Bossma</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f5f7fa;
      display: flex;
      height: 100vh;
      overflow-x: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: linear-gradient(180deg, #00c6ff, #0072ff);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 20px;
      position: fixed;
      top: 0;
      left: 0; /* langsung terbuka */
      height: 100%;
      transition: left 0.3s ease;
      z-index: 1000;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }
    .logo img {
      width: 90px;
      border-radius: 10px;
      box-shadow: 0 0 15px #00f7ff;
      transition: 0.3s;
    }
    .logo img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #00f7ff;
    }
    .logo h2 {
      font-size: 14px;
      margin-top: 10px;
      color: #fff;
    }

    .menu { list-style: none; padding: 0; }
    .menu li {
      margin: 15px 0;
      cursor: pointer;
      transition: 0.3s;
      padding: 8px;
      border-radius: 6px;
    }
    .menu li:hover {
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 10px #00f7ff;
    }

    .bottom { display: flex; flex-direction: column; gap: 10px; }
    .mode-btn, .logout {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    .mode-btn { background: #fff; color: #0072ff; }
    .logout { background: #ff4b5c; color: #fff; }
    .mode-btn:hover, .logout:hover {
      box-shadow: 0 0 12px #fff;
      transform: scale(1.05);
    }

    /* Main Content */
    .content {
      flex: 1;
      padding: 20px;
      margin-left: 220px;
      transition: margin-left 0.3s ease;
      width: 100%;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .profile { display: flex; align-items: center; gap: 10px; }
    .avatar {
      background: #0072ff;
      color: #fff;
      border-radius: 50%;
      width: 50px; height: 50px;
      display: flex; align-items: center; justify-content: center;
      font-weight: bold;
      transition: 0.3s;
    }
    .avatar:hover {
      box-shadow: 0 0 15px #0072ff;
      transform: rotate(10deg);
    }

    .download {
      background: #00c6ff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    .download:hover {
      background: #0072ff;
      box-shadow: 0 0 12px #00c6ff;
    }

    /* Cards */
    .cards { display: flex; gap: 20px; margin: 20px 0; flex-wrap: wrap; }
    .card {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      min-width: 150px;
      transition: 0.5s;
      opacity: 0;
      transform: translateY(30px);
    }
    .card.show {
      opacity: 1;
      transform: translateY(0);
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 15px #00c6ff;
    }
    .orange { border-top: 5px solid #ffb347; }
    .blue { border-top: 5px solid #0072ff; }
    .purple { border-top: 5px solid #9b59b6; }

    /* Stats */
    .stats { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
    .stat {
      flex: 1;
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      min-width: 150px;
      transition: 0.5s;
      opacity: 0;
      transform: translateY(30px);
    }
    .stat.show {
      opacity: 1;
      transform: translateY(0);
    }
    .stat:hover {
      box-shadow: 0 0 15px #0072ff;
      transform: scale(1.05);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .content { margin-left: 0; }
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="logo-jambi.png" alt="Logo Jambi">
      <h2>Sepucuk Jambi Sembilan Lurah</h2>
    </div>
    <ul class="menu">
      <li>🏠 Dashboard</li>
      <li>💬 Messages</li>
      <li>📊 Report</li>
      <li>⚙️ Setting</li>
      <li>🔒 Privacy</li>
      <li>🧩 Configuration</li>
    </ul>
    <div class="bottom">
      <button class="mode-btn">🌙 Light Mode</button>
      <button class="logout">Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="content">
    <header class="topbar">
      <div class="profile">
        <div class="avatar">YN</div>
        <div>
          <h3>Your Name</h3>
          <p>WELCOME TO DASHBOARD</p>
        </div>
      </div>
      <button class="download">⬇️ Download Report</button>
    </header>

    <section class="cards">
      <div class="card orange">Total Project<br><span>30</span></div>
      <div class="card blue">Total Tasks<br><span>210</span></div>
      <div class="card purple">Members<br><span>86</span></div>
    </section>

    <section class="stats">
      <div class="stat">
        <h4>Profit</h4>
        <p>💰 $850.00</p>
        <span style="color:green;">+45%</span>
      </div>
      <div class="stat">
        <h4>Total Payments</h4>
        <p>💵 $550.00</p>
        <span style="color:red;">Tax 5%</span>
      </div>
    </section>
  </main>

  <script>
    // Animasi slide-in untuk card & stat
    window.addEventListener("load", () => {
      document.querySelectorAll(".card, .stat").forEach((el, i) => {
        setTimeout(() => {
          el.classList.add("show");
        }, i * 200);
      });
    });
  </script>
</body>
</html>
