<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Dinas Pendidikan Provinsi Jambi</title>
  <!-- Menghubungkan ke file CSS eksternal -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-container">
    
    <!-- === START SIDEBAR === -->
    <aside class="sidebar">
      
      <!-- Bagian Logo Provinsi Jambi (Memanggil file logo-jambi.png Anda) -->
      <div class="sidebar-logo">
        <img src="logo-jambi.png" alt="Logo Provinsi Jambi">
      </div>
      
      <!-- Profil Pengguna (Dinas Pendidikan Provinsi Jambi) -->
      <div class="profile-section">
        <div class="profile-img-wrapper">
          <!-- Menggunakan SVG Avatar default bawaan agar tidak menampilkan gambar rusak -->
          <svg class="profile-img" viewBox="0 0 24 24" fill="none" xmlns="http://w3.org" style="background: #f3f4f6; padding: 10px; border-radius: 50%;">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" fill="#9ca3af"/>
          </svg>
        </div>
        <h2 class="profile-name">DINAS PENDIDIKAN</h2>
        <h2 class="profile-name" style="margin-top: 2px;">PROVINSI JAMBI</h2>
        <p class="profile-role">Bidang Pembinaan SMA</p>
      </div>

      <!-- Navigasi Menu Tengah (Sesuai Gambar Proyek Anda) -->
      <nav class="sidebar-nav">
        <ul>
          
          <!-- Menu 1 (Status Kirim) - Default Aktif -->
          <li class="menu-item active">
            <a href="#">
              <span class="menu-link-content">
                <!-- Ikon Rumah/Status SVG -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Status Kirim</span>
              </span>
              <!-- Ikon Panah Kanan SVG -->
              <svg class="arrow-icon" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </a>
          </li>

          <!-- Menu 2 (Laporan BKU) -->
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <!-- Ikon Dokumen/File BKU SVG -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <span>Laporan BKU</span>
              </span>
              <svg class="arrow-icon" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </a>
          </li>

          <!-- Menu 3 (Notifications) -->
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <!-- Ikon Lonceng SVG -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.63-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.64 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                <span>Notifications</span>
              </span>
            </a>
          </li>

          <!-- Menu 4 (Rkas Awal) -->
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <!-- Ikon Koper/Arsip Dana SVG -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"/></svg>
                <span>Rkas Awal</span>
              </span>
            </a>
          </li>

          <!-- Menu 5 (Stats) -->
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <!-- Ikon Grafik Statistik SVG -->
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20h4V4h-4v16zm-6 0h4v-8H4v8zM16 9v11h4V9h-4z"/></svg>
                <span>Stats</span>
              </span>
            </a>
          </li>

        </ul>
      </nav>

      <!-- Tombol Keluar Bagian Bawah -->
      <div class="sidebar-footer">
        <a href="#" class="signout-btn">
          <!-- Ikon Keluar SVG -->
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
          <span>Sign out</span>
        </a>
      </div>

    </aside>
    <!-- === END SIDEBAR === -->

    <!-- Area Konten Utama Halaman -->
    <main class="main-content">
      <h1>Selamat Datang</h1>
      <p>Konten utama website Anda diletakkan di sini...</p>
    </main>

  </div>

  <!-- Menghubungkan ke file JavaScript eksternal -->
  <script src="script.js"></script>
</body>
</html>
