<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard BOSP - Dinas Pendidikan Provinsi Jambi</title>
  <style>
    /* ==========================================================================
       1. SETUP LAYOUT TEMA PUTIH MINIMALIS ASLI KAMU
       ========================================================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #ffffff;
      color: #334155;
      overflow: hidden;
    }

    .app-container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    /* ==========================================================================
       2. SIDEBAR KIRI (TEMA PUTIH MODERN)
       ========================================================================== */
    .sidebar {
      width: 270px;
      max-width: 270px;
      min-width: 270px;
      background-color: #ffffff;
      border-right: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 30px 0;
      height: 100%;
      flex-shrink: 0;
    }

    .sidebar-logo {
      padding: 0 24px;
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
    }

    .sidebar-logo img {
      height: 75px;
      width: auto;
      object-fit: contain;
    }

    .profile-section {
      text-align: center;
      padding: 0 20px;
      margin-bottom: 25px;
      margin-top: -5px;
    }

    .profile-name {
      color: #0f172a;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.3;
    }

    .profile-role {
      color: #64748b;
      font-size: 11px;
      margin-top: 3px;
      font-weight: 500;
    }

    .sidebar-nav {
      flex: 1;
    }

    .sidebar-nav ul {
      list-style: none;
    }

    .menu-item a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 24px;
      text-decoration: none;
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      border-left: 4px solid transparent;
    }

    .menu-link-content {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .arrow-icon {
      font-size: 9px;
      color: #cbd5e1;
    }

    .menu-item.active a {
      color: #1e3a8a;
      background-color: #eff6ff;
      border-left-color: #1e3a8a;
    }

    /* ==========================================================================
       3. AREA EMBED GOOGLE SHEET LIVE (KANAN)
       ========================================================================== */
    .main-content {
      flex: 1;
      padding: 20px;
      background-color: #f8fafc;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sheet-frame-wrapper {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- SIDEBAR KIRI -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img src="logo-jambi.png" alt="Logo Provinsi Jambi">
      </div>
      
      <div class="profile-section">
        <h2 class="profile-name">DINAS PENDIDIKAN</h2>
        <h2 class="profile-name" style="margin-top: 1px;">PROVINSI JAMBI</h2>
        <p class="profile-role">Bidang Pembinaan SMA</p>
      </div>

      <nav class="sidebar-nav">
        <ul>
          <li class="menu-item active">
            <a href="#">
              <span class="menu-link-content">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                <span>Status Kirim</span>
              </span>
              <svg class="arrow-icon" width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
            </a>
          </li>
          <li class="menu-item">
            <a href="#">
              <span class="menu-link-content">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
                <span>Laporan BKU</span>
              </span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- AREA KONTEN UTAMA - MENAMPILKAN SHEET ASLI SECARA ELEGAN -->
    <main class="main-content">
      <div class="sheet-frame-wrapper">
        <!-- Menampilkan langsung data spreadsheet publikasimu secara live -->
        <iframe src="https://google.com"></iframe>
      </div>
    </main>

  </div>

</body>
</html>
